<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LMS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Top Navbar -->
<nav class="bg-purple-600 text-white p-4 flex justify-between items-center">
    <a href="/dashboard" class="font-bold text-lg">MyLMS</a>
    <div class="space-x-4">
        <a href="/dashboard" class="hover:underline">Dashboard</a>
        <a href="/courses" class="hover:underline">Courses</a>
        <a href="/assignment" class="hover:underline">Assignments</a>
        <a href="/profile" class="hover:underline">Profile</a>
        <a href="/ai" class="hover:underline">AI Assistant</a>
        <a href="/logout" class="hover:underline text-red-200">Logout</a>
    </div>
</nav>

<!-- Flash Messages -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="fixed top-4 right-4 space-y-2 z-50">
      {% for message in messages %}
        <div class="bg-purple-500 text-white px-4 py-2 rounded shadow">
          {{ message }}
        </div>
      {% endfor %}
    </div>
    <script>
      setTimeout(() => {
        document.querySelectorAll('.fixed div').forEach(el => el.remove());
      }, 3000);
    </script>
  {% endif %}
{% endwith %}

<!-- Page Content -->
<main class="p-6">
    {% block content %}{% endblock %}
</main>

</body>
</html>
