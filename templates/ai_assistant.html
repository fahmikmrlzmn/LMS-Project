{% extends "base.html" %}
{% block title %}AI Study Assistant{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold text-purple-600 mb-6 text-center">AI Study Assistant</h1>

<div class="max-w-3xl mx-auto bg-white shadow-lg rounded-2xl p-6 flex flex-col h-[70vh]">

    <!-- Chat History -->
    <div class="flex-1 overflow-y-auto mb-4 flex flex-col space-y-3 ai-chat p-2 border rounded-xl bg-gray-50">
        {% if chat_history %}
            {% for msg in chat_history %}
            <div class="flex flex-col space-y-1">
                <div class="self-end bg-purple-500 text-white p-2 rounded-xl max-w-[80%]">{{ msg.user }}</div>
                <div class="self-start bg-gray-200 p-2 rounded-xl max-w-[80%]">{{ msg.ai }}</div>
            </div>
            {% endfor %}
        {% else %}
        <p class="text-gray-500 text-center">No messages yet. Ask a question below!</p>
        {% endif %}
    </div>

    <!-- Clear Chat -->
    <div class="text-right mb-2">
        <a href="/ai?clear=1" class="text-red-500 hover:underline text-sm">Clear Chat</a>
    </div>

    <!-- AI Form -->
    <form method="POST" class="flex gap-2">
        <select name="course_id" class="border px-3 py-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
            <option value="">General</option>
            {% for course in courses %}
            <option value="{{ course[0] }}">{{ course[1] }}</option>
            {% endfor %}
        </select>
        <input type="text" name="question" placeholder="Ask your question..." required
               class="flex-1 px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400">
        <button type="submit" class="bg-purple-500 text-white px-4 py-2 rounded-xl hover:bg-purple-600 transition">Ask AI</button>
    </form>

</div>

{% endblock %}
